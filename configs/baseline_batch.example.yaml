batch_id: baseline_pilot_v1
method_name: langchain_read_search
prompt_path: prompts/baseline/baseline_task_prompt_v1.txt
output_root: runs/baseline
repetitions: 3
max_steps: 20
temperature: 0.2
max_tokens: 8192
max_file_chars: 20000
max_tool_result_chars: 8000

models:
  - model_id: deepseek_v4
    provider: deepseek
    model: deepseek-v4-pro

  - model_id: qwen3
    provider: qwen
    model: qwen-plus

  - model_id: gpt5
    provider: gpt
    model: gpt-5

  - model_id: claude4
    provider: claude
    model: claude-opus-4-20250514

input_scopes:
  - scope_id: h18_debug_jtag_scope
    path: datasets/agent_inputs/hackatdac18/debug_jtag_scope

  - scope_id: h19_debug_jtag_scope
    path: datasets/agent_inputs/hackatdac19/h19_debug_jtag_scope

  - scope_id: h21_dma_pkt_scope
    path: datasets/agent_inputs/hackatdac21/h21_dma_pkt_scope
